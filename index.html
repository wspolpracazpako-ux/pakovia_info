<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pakovia — SPL Sezon 4</title>
  <meta name="description" content="Oficjalna strona państwa Pakovia z serwera Minecraft SPL Sezon 4.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #04060e;
      --bg-secondary: #0a1128;
      --dark-blue: #0d1b3e;
      --mid-blue: #112240;
      --light-blue: #00b4d8;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.15);
      --white: #e2e8f0;
      --white-pure: #f8fafc;
      --muted: #64748b;
      --glass-bg: rgba(13, 27, 62, 0.45);
      --glass-border: rgba(0, 180, 216, 0.12);
      --glass-hover: rgba(0, 180, 216, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-glow: 0 0 30px rgba(0, 180, 216, 0.15);
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--white);
      line-height: 1.7;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 180, 216, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 216, 0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 15% 20%, rgba(0, 180, 216, 0.06), transparent),
        radial-gradient(ellipse 500px 500px at 85% 70%, rgba(0, 100, 180, 0.05), transparent);
      z-index: 0;
      pointer-events: none;
    }

    h1, h2, h3, h4 { font-family: 'Cinzel', serif; font-weight: 700; line-height: 1.2; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ===== LOADER ===== */
    #loader {
      position: fixed; inset: 0; z-index: 10000;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #loader .loader-title {
      font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
      background: linear-gradient(135deg, var(--light-blue), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: loaderPulse 1.5s ease-in-out infinite;
    }
    #loader .loader-bar {
      width: 120px; height: 3px; background: var(--dark-blue);
      border-radius: 4px; margin-top: 1.5rem; overflow: hidden;
    }
    #loader .loader-bar::after {
      content: ''; display: block; width: 40%; height: 100%;
      background: var(--light-blue); border-radius: 4px;
      animation: loaderSlide 1.2s ease-in-out infinite;
    }
    @keyframes loaderPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes loaderSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    /* ===== CANVAS ===== */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ===== NAVBAR ===== */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 1rem 0; transition: var(--transition);
    }
    #navbar.scrolled {
      padding: 0.5rem 0;
      background: rgba(4, 6, 14, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-container {
      max-width: 1280px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, var(--light-blue), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.05em;
    }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a {
      padding: 0.5rem 0.85rem; font-size: 0.85rem; font-weight: 500;
      color: var(--muted); border-radius: var(--radius-sm); transition: var(--transition); position: relative;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); background: var(--glass-hover); }
    .nav-links a.active::after {
      content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 2px; background: var(--light-blue); border-radius: 2px;
    }
    .nav-toggle {
      display: none; background: none; border: 1px solid var(--glass-border);
      color: var(--white); font-size: 1.3rem; padding: 0.5rem 0.7rem;
      border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
    }
    .nav-toggle:hover { background: var(--glass-hover); }

    .nav-mobile-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(4, 6, 14, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .nav-mobile-overlay.open { display: flex; }
    .nav-mobile-overlay a {
      font-family: 'Cinzel', serif; font-size: 1.2rem; padding: 0.8rem 2rem;
      color: var(--muted); border-radius: var(--radius-sm); transition: var(--transition);
    }
    .nav-mobile-overlay a:hover, .nav-mobile-overlay a.active { color: var(--white); background: var(--glass-hover); }
    .nav-mobile-close {
      position: absolute; top: 1.5rem; right: 1.5rem; background: none;
      border: 1px solid var(--glass-border); color: var(--white); font-size: 1.5rem;
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: var(--transition);
    }
    .nav-mobile-close:hover { background: var(--glass-hover); }

    /* ===== SEKCJE — WSPÓLNE ===== */
    section { position: relative; z-index: 1; padding: 6rem 1.5rem; }
    .section-container { max-width: 1200px; margin: 0 auto; }
    .section-label {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--light-blue); margin-bottom: 0.75rem;
    }
    .section-label i { font-size: 0.7rem; }
    .section-title { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 900; color: var(--white-pure); margin-bottom: 1rem; }
    .section-desc { color: var(--muted); max-width: 600px; font-size: 1rem; line-height: 1.8; }
    .section-divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--light-blue), var(--accent));
      border-radius: 3px; margin: 1.5rem 0 3rem;
    }

    /* ===== GLASS ===== */
    .glass {
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: var(--radius); transition: var(--transition);
    }
    .glass:hover { border-color: rgba(0, 180, 216, 0.25); box-shadow: var(--shadow-glow); transform: translateY(-4px); }
    .glass-static {
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
    }

    /* ===== PLACEHOLDER ===== */
    .img-placeholder {
      background: linear-gradient(135deg, var(--bg-secondary), var(--dark-blue));
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(0, 180, 216, 0.2); gap: 0.5rem; overflow: hidden; position: relative;
    }
    .img-placeholder i { font-size: 1.8rem; }
    .img-placeholder span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .img-placeholder::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 180, 216, 0.02) 10px, rgba(0, 180, 216, 0.02) 20px);
    }

    /* ===== PRZYCISKI ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1.8rem; font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem; font-weight: 600; border-radius: var(--radius-sm);
      border: none; cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--light-blue), #0090b0); color: var(--bg); }
    .btn-primary:hover { box-shadow: 0 0 25px rgba(0, 180, 216, 0.4); transform: translateY(-2px); }
    .btn-outline { background: transparent; color: var(--white); border: 1px solid var(--glass-border); }
    .btn-outline:hover { border-color: var(--light-blue); background: var(--glass-hover); transform: translateY(-2px); }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding-top: 0; position: relative; overflow: hidden;
    }
    .hero-bg { position: absolute; inset: 0; z-index: -1; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; }
    .hero-bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(4,6,14,0.7) 0%, rgba(4,6,14,0.5) 40%, rgba(4,6,14,0.85) 100%);
    }
    .hero-bg-fallback {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,100,180,0.15), transparent),
        radial-gradient(ellipse 60% 50% at 30% 60%, rgba(0,180,216,0.08), transparent),
        linear-gradient(180deg, var(--bg), var(--bg-secondary));
    }
    .hero-content { position: relative; z-index: 2; }
    .hero-title {
      font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900; letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--white-pure) 0%, var(--light-blue) 50%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      position: relative; margin-bottom: 0.5rem;
    }
    .hero-title::after {
      content: 'Pakovia'; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(0,229,255,0.15) 50%, transparent 70%);
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%, 100% { background-position: 200% center; } 50% { background-position: -200% center; } }
    .hero-motto {
      font-size: clamp(1rem, 2.5vw, 1.25rem); color: var(--muted);
      font-weight: 300; margin-bottom: 2.5rem; letter-spacing: 0.05em;
    }
    .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-glow {
      position: absolute; width: 500px; height: 200px;
      background: radial-gradient(ellipse, rgba(0,180,216,0.12), transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1;
      animation: breathe 4s ease-in-out infinite; pointer-events: none;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }
    .hero-server {
      margin-top: 2rem; font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .hero-server span { color: var(--light-blue); font-weight: 600; }

    /* ===== O PAKOVII ===== */
    #about { background: linear-gradient(180deg, transparent, rgba(10,17,40,0.3), transparent); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .about-text p { color: var(--muted); margin-bottom: 1.2rem; font-size: 0.95rem; }
    .about-goals { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
    .about-goals li { display: flex; align-items: flex-start; gap: 0.75rem; color: var(--white); font-size: 0.95rem; }
    .about-goals li i { color: var(--light-blue); margin-top: 0.3rem; font-size: 0.75rem; }
    .about-info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .about-info-card { padding: 1.2rem; text-align: center; }
    .about-info-card .info-value { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700; color: var(--light-blue); }
    .about-info-card .info-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }

    /* ===== WŁADCA ===== */
    .ruler-card { max-width: 700px; margin: 0 auto; padding: 3rem; display: flex; gap: 2.5rem; align-items: center; }
    .ruler-avatar {
      flex-shrink: 0; width: 160px; height: 200px; border-radius: var(--radius);
      overflow: hidden; border: 2px solid var(--glass-border); position: relative;
    }
    .ruler-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ruler-info { flex: 1; }
    .ruler-rank {
      display: inline-block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); background: var(--accent-dim);
      padding: 0.3rem 0.8rem; border-radius: 20px; margin-bottom: 0.75rem;
    }
    .ruler-name { font-size: 1.8rem; font-weight: 900; color: var(--white-pure); margin-bottom: 0.3rem; }
    .ruler-discord { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
    .ruler-discord i { color: #5865F2; margin-right: 0.3rem; }
    .ruler-desc { color: var(--muted); font-size: 0.92rem; line-height: 1.8; }

    /* ===== CZŁONKOWIE ===== */
    .citizens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .citizen-card { padding: 1.5rem; display: flex; gap: 1.2rem; align-items: flex-start; }
    .citizen-avatar { flex-shrink: 0; width: 64px; height: 80px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--glass-border); }
    .citizen-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .citizen-info { flex: 1; min-width: 0; }
    .citizen-name { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700; color: var(--white-pure); margin-bottom: 0.15rem; }
    .citizen-discord { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
    .citizen-discord i { color: #5865F2; margin-right: 0.25rem; font-size: 0.7rem; }
    .citizen-role {
      display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--light-blue); background: rgba(0,180,216,0.1);
      padding: 0.2rem 0.6rem; border-radius: 6px; margin-bottom: 0.5rem;
    }
    .citizen-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

    /* ===== OGŁOSZENIA ===== */
    .announcements-list { display: flex; flex-direction: column; gap: 1rem; max-width: 800px; }
    .announcement-item { padding: 1.5rem; display: flex; gap: 1.2rem; align-items: flex-start; position: relative; overflow: hidden; }
    .announcement-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0 3px 3px 0; }
    .announcement-item.type-info::before { background: var(--light-blue); }
    .announcement-item.type-warning::before { background: #f59e0b; }
    .announcement-item.type-success::before { background: #10b981; }
    .announcement-item.type-important::before { background: #ef4444; }
    .announcement-date { flex-shrink: 0; text-align: center; min-width: 56px; }
    .announcement-date .day { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; color: var(--white-pure); line-height: 1; }
    .announcement-date .month { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .announcement-body { flex: 1; }
    .announcement-title { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700; color: var(--white-pure); margin-bottom: 0.3rem; }
    .announcement-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

    /* ===== PROJEKTY ===== */
    .projects-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .projects-tab {
      padding: 0.6rem 1.5rem; font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem; font-weight: 600; color: var(--muted); background: transparent;
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
    }
    .projects-tab:hover { color: var(--white); border-color: var(--light-blue); }
    .projects-tab.active { color: var(--bg); background: var(--light-blue); border-color: var(--light-blue); }
    .projects-panel { display: none; }
    .projects-panel.active { display: block; }
    .project-card { padding: 1.5rem; margin-bottom: 1rem; }
    .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }
    .project-name { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--white-pure); }
    .project-deadline { font-size: 0.75rem; color: var(--muted); }
    .project-deadline i { margin-right: 0.3rem; }
    .project-desc { font-size: 0.88rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.7; }
    .progress-bar-container { width: 100%; height: 6px; background: var(--dark-blue); border-radius: 6px; overflow: hidden; }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--accent));
      border-radius: 6px; width: 0%; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-label { display: flex; justify-content: flex-end; margin-top: 0.4rem; font-size: 0.75rem; color: var(--light-blue); font-weight: 600; }
    .planned-card { padding: 1.2rem 1.5rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; }
    .planned-card .planned-icon {
      width: 40px; height: 40px; border-radius: 10px; background: var(--accent-dim);
      display: flex; align-items: center; justify-content: center; color: var(--light-blue); flex-shrink: 0; font-size: 0.9rem;
    }
    .planned-card .planned-name { font-family: 'Cinzel', serif; font-weight: 700; color: var(--white-pure); font-size: 0.95rem; }
    .planned-card .planned-desc { font-size: 0.82rem; color: var(--muted); }

    /* ===== SKLEPY ===== */
    .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
    .shop-card { padding: 1.5rem; }
    .shop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .shop-name { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--white-pure); }
    .shop-status {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 0.25rem 0.7rem; border-radius: 20px; flex-shrink: 0;
    }
    .shop-status.open { color: #10b981; background: rgba(16,185,129,0.12); }
    .shop-status.building { color: #f59e0b; background: rgba(245,158,11,0.12); }
    .shop-details { display: flex; flex-direction: column; gap: 0.5rem; }
    .shop-detail { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: var(--muted); }
    .shop-detail i { width: 16px; text-align: center; color: var(--light-blue); font-size: 0.75rem; }
    .shop-desc { margin-top: 1rem; font-size: 0.82rem; color: var(--muted); line-height: 1.7; padding-top: 1rem; border-top: 1px solid var(--glass-border); }

    /* ===== BUDOWLE ===== */
    .buildings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    .building-card { overflow: hidden; }
    .building-image { width: 100%; height: 200px; overflow: hidden; }
    .building-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .building-card:hover .building-image img { transform: scale(1.05); }
    .building-body { padding: 1.5rem; }
    .building-name { font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--white-pure); margin-bottom: 0.4rem; }
    .building-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.7; margin-bottom: 1rem; }
    .building-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .building-coords { font-size: 0.78rem; color: var(--light-blue); font-family: 'Space Grotesk', monospace; }
    .building-coords i { margin-right: 0.3rem; }
    .building-status-badge { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.2rem 0.6rem; border-radius: 6px; color: var(--light-blue); background: rgba(0,180,216,0.1); }

    /* ===== WSPÓLNE PROJEKTY ===== */
    #jointProjects { background: linear-gradient(180deg, transparent, rgba(10,17,40,0.3), transparent); }
    .joint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
    .joint-card {
      padding: 2rem; position: relative; overflow: hidden;
    }
    .joint-card::before {
      content: ''; position: absolute; top: 0; right: 0;
      width: 140px; height: 140px;

      width: 56px; height: 56px; border-radius: 14px;
      background: var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--light-blue); margin-bottom: 1.2rem;
      transition: var(--transition);
    }
    .joint-card:hover .joint-icon {
      background: linear-gradient(135deg, var(--light-blue), var(--accent));
      color: var(--bg); box-shadow: 0 0 25px rgba(0,180,216,0.3);
    }
    .joint-country {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); background: var(--accent-dim);
      padding: 0.25rem 0.75rem; border-radius: 20px; margin-bottom: 0.75rem;
    }
    .joint-country i { font-size: 0.65rem; }
    .joint-name { font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; color: var(--white-pure); margin-bottom: 0.6rem; }
    .joint-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }

    /* ===== SOJUSZNICY ===== */
    .allies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

    .ally-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--glass-border); padding: 3rem 1.5rem 2rem; text-align: center; }

    .footer-server { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .footer-links a { font-size: 0.85rem; color: var(--muted); transition: var(--transition); }
    .footer-links a:hover { color: var(--light-blue); }
    .footer-copyright { font-size: 0.75rem; color: rgba(100,116,139,0.6); }

    /* ===== BACK TO TOP ===== */
    #backToTop {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 900;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); color: var(--light-blue); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transform: translateY(10px); transition: var(--transition);
    }
    #backToTop.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    #backToTop:hover { background: var(--light-blue); color: var(--bg); box-shadow: 0 0 20px rgba(0,180,216,0.3); }

    /* ===== SCROLL REVEAL ===== */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      .reveal { opacity: 1; transform: none; }
    }

    /* ===== RESPONSYWNOŚĆ ===== */

    /* ===== CZĄSTECZKI ===== */
    function initParticles() {
      var canvas = document.getElementById('particles');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var animId;

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

      function createParticles() {
        particles = [];
        var count = Math.min(70, Math.floor(window.innerWidth / 20));
        for (var i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.max(0.5, Math.random() * 2),
            alpha: Math.random() * 0.4 + 0.1
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < -10) p.x = canvas.width + 10;
          if (p.x > canvas.width + 10) p.x = -10;
          if (p.y < -10) p.y = canvas.height + 10;
          if (p.y > canvas.height + 10) p.y = -10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.3, p.r), 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 180, 216, ' + p.alpha + ')';
          ctx.fill();
        }
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = 'rgba(0, 180, 216, ' + (0.06 * (1 - dist / 120)) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        animId = requestAnimationFrame(draw);
      }

      resize(); createParticles(); draw();
      window.addEventListener('resize', function() { resize(); createParticles(); });
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) cancelAnimationFrame(animId);
    }


    /* ===== NAVBAR ===== */
    function initNavbar() {
      var navbar = document.getElementById('navbar');
      var navToggle = document.getElementById('navToggle');
      var navMobile = document.getElementById('navMobile');
      var navMobileClose = document.getElementById('navMobileClose');
      var sections = document.querySelectorAll('section[id]');
      var navLinks = document.querySelectorAll('.nav-links a');
      var mobileLinks = document.querySelectorAll('.nav-mobile-overlay a');

      window.addEventListener('scroll', function() {
        navbar.classList.toggle('scrolled', window.scrollY > 50);
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var id = entry.target.id;
            navLinks.forEach(function(l) { l.classList.toggle('active', l.getAttribute('href') === '#' + id); });
            mobileLinks.forEach(function(l) { l.classList.toggle('active', l.getAttribute('href') === '#' + id); });
          }
        });
      }, { rootMargin: '-40% 0px -55% 0px' });

      sections.forEach(function(s) { observer.observe(s); });

      navToggle.addEventListener('click', function() {
        navMobile.classList.add('open');
        document.body.style.overflow = 'hidden';
      });

      function closeMobile() {
        navMobile.classList.remove('open');
        document.body.style.overflow = '';
      }

      navMobileClose.addEventListener('click', closeMobile);
      mobileLinks.forEach(function(l) { l.addEventListener('click', closeMobile); });
    }


    /* ===== SCROLL REVEAL ===== */
    function observeReveals() {
      var reveals = document.querySelectorAll('.reveal:not(.revealed)');
      var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) { entry.target.classList.add('revealed'); obs.unobserve(entry.target); }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      reveals.forEach(function(el) { obs.observe(el); });
    }


    /* ===== PASKI POSTĘPU ===== */
    function animateProgressBars() {
      var bars = document.querySelectorAll('.progress-bar-fill[data-progress]');
      var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var bar = entry.target;
            setTimeout(function() { bar.style.width = bar.dataset.progress + '%'; }, 200);
            obs.unobserve(bar);
          }
        });
      }, { threshold: 0.2 });
      bars.forEach(function(b) { obs.observe(b); });
    }


    /* ===== BACK TO TOP ===== */

    /* ===== LOADER ===== */
